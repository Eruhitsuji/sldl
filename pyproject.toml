[project]
name = "sldl-compiler"
version = "1.0.10"
description = "SLDL v1.0.10 stable bilingual release with generated reference index and CLI help reference"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
sldlc = "sldl_compiler.cli:main"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = ["-p", "no:ddtrace"]
