name: SLDL tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python - <<'PY'
          import sldl_compiler
          print(f"source checkout sldl_compiler {sldl_compiler.__version__}")
          PY

      - name: Validate package metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          text=Path("pyproject.toml").read_text(encoding="utf-8")
          required=["[build-system]", "[tool.setuptools.packages.find]", "include = [\"sldl_compiler*\"]", "namespaces = false"]
          missing=[item for item in required if item not in text]
          if(missing):
              raise SystemExit(f"missing package metadata: {missing}")
          print("package metadata is explicit")
          PY

      - name: Run pytest
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          python -m pytest -q
